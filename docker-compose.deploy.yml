# 生产部署 docker-compose（从 GHCR 拉取预构建镜像）
# 使用方式: docker compose -f docker-compose.deploy.yml up -d
#
# 镜像来源:
#   GHCR:  ghcr.io/lzcapp/typhoon-system:latest
#   DockerHub: seeleo/typhoon-system:latest
#
# 1Panel 部署时将此文件内容粘贴到编排中，修改路径为绝对路径

version: '3.8'

services:
  typhoon-system:
    # 从 GitHub Container Registry 拉取（推荐，无需额外注册）
    image: ghcr.io/lzcapp/typhoon-system:latest
    # 或者从 Docker Hub 拉取（取消注释下行，注释上行）
    # image: seeleo/typhoon-system:latest
    container_name: typhoon-system
    restart: always
    ports:
      - "8088:8088"
    volumes:
      # 持久化数据（ISC缓存、预测结果）
      - ./data:/app/data
      # ⚠️ 不要挂载 ./models！模型文件已打包在镜像内（486KB），
      # 挂载空目录会覆盖镜像内置的 lstm_best.pt 导致 LSTM 不可用。
      # 如果需要持久化重新训练的模型，先将镜像内的模型复制出来：
      #   docker cp typhoon-system:/app/backend/models ./models
      # ⚠️ 不要挂载 ./static！会覆盖镜像内置的 index.html 导致 404
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/data/status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
