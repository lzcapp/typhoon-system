version: '3.8'

services:
  typhoon-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: typhoon-system
    restart: always
    ports:
      - "8088:8088"
    volumes:
      # 持久化数据（ISC缓存、预测结果）
      - ./data:/app/data
      # 持久化模型权重
      - ./models:/app/models
      # 持久化静态文件（可自定义前端）
      - ./static:/app/static
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/data/status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
