version: '3.8'

services:
  typhoon-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: typhoon-system
    restart: always
    ports:
      - "8088:8088"
    volumes:
      # 持久化数据（ISC缓存、预测结果、ECMWF BUFR缓存、GRIB2缓存）
      - ./data:/app/data
      # Pangu-Weather ONNX模型权重（可选挂载，约2.2GB）
      # 如果模型已下载到宿主机，挂载此目录可避免重建镜像
      - ./backend/models/pangu:/app/backend/models/pangu
      # ⚠️ 不要挂载 ./static！会覆盖镜像内置的 index.html 导致 404
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/data/status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
