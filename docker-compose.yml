version: '3.8'

services:
  typhoon-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: typhoon-system
    restart: always
    ports:
      - "8088:8088"
    volumes:
      # 持久化数据（ISC缓存、预测结果）
      - ./data:/app/data
      # 持久化模型权重（LSTM + Pangu ONNX）
      - ./models:/app/backend/models
      # ⚠️ 不要挂载 ./static:/app/static！会覆盖镜像内置的 index.html 导致 404
      # 如果需要自定义前端，先确保 ./static/index.html 存在再取消注释：
      # - ./static:/app/static
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/data/status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
