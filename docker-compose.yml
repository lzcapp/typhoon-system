version: '3.8'

services:
  typhoon-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: typhoon-system
    restart: always
    ports:
      - "8088:8088"
    volumes:
      # 持久化数据（ISC缓存、预测结果、ECMWF BUFR缓存、GRIB2缓存）
      - ./data:/app/data
      # Pangu-Weather ONNX模型权重(~2.2GB)
      # 首次启动自动下载，通过volume持久化后无需重复下载
      - ./backend/models/pangu:/app/backend/models/pangu
      # ⚠️ 不要挂载 ./static！会覆盖镜像内置的 index.html 导致 404
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
      # Pangu模型自动下载(默认开启，设为0关闭)
      - AUTO_DOWNLOAD_PANGU=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/data/status"]
      interval: 60s
      timeout: 10s
      retries: 3
      # 首次启动可能需要下载模型(2.2GB)，延长等待时间
      start_period: 120s
