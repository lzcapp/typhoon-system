version: '3.8'

services:
  typhoon-system:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: typhoon-system
    restart: always
    ports:
      - "8088:8088"
    volumes:
      # 持久化数据（ISC缓存、预测结果）
      - ./data:/app/data
      # ⚠️ 不要挂载 ./models！模型文件已打包在镜像内，挂载空目录会覆盖
      # ⚠️ 不要挂载 ./static！会覆盖镜像内置的 index.html 导致 404
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/data/status"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
