<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台风路径预测系统 | Typhoon Path Prediction</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-card: #1a2332;
  --bg-hover: #243044;
  --text-primary: #e8edf5;
  --text-secondary: #8899aa;
  --text-muted: #556677;
  --accent-blue: #3b82f6;
  --accent-cyan: #06b6d4;
  --accent-red: #ef4444;
  --accent-orange: #f59e0b;
  --accent-green: #22c55e;
  --accent-purple: #a855f7;
  --border-color: #2a3a4a;
  --shadow: 0 4px 12px rgba(0,0,0,0.3);
  --radius: 8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
}
.app-layout {
  display: grid;
  grid-template-columns: 320px 1fr 280px;
  grid-template-rows: 60px 1fr;
  height: 100vh;
}

/* Header */
.header {
  grid-column: 1 / -1;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 1000;
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-logo .icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.header-logo h1 {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 1px;
}
.header-logo .sub {
  font-size: 12px;
  color: var(--text-secondary);
  margin-left: 8px;
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-btn {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 6px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}
.header-btn:hover { background: var(--bg-hover); border-color: var(--accent-blue); }
.header-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); }
.header-btn .fa-sync-alt.spinning { animation: spin 0.8s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.last-update { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

/* Left Panel - Typhoon List */
.left-panel {
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-title {
  padding: 16px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.search-box {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-color);
}
.search-input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 8px 12px;
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
}
.search-input:focus { border-color: var(--accent-blue); }
.year-selector {
  padding: 8px 16px;
  border-bottom: 1px solid var(--border-color);
  display: flex;
  align-items: center;
  gap: 8px;
}
.data-cache-panel {
  padding: 4px 16px 8px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.year-selector label {
  font-size: 12px;
  color: var(--text-secondary);
}
.year-select {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 4px 8px;
  color: var(--text-primary);
  font-size: 13px;
  outline: none;
}
.typhoon-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.typhoon-item {
  padding: 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid transparent;
  margin-bottom: 4px;
}
.typhoon-item:hover { background: var(--bg-hover); }
.typhoon-item.selected { background: var(--bg-hover); border-color: var(--accent-blue); }
.typhoon-item .id-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.typhoon-item .tfid {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent-cyan);
}
.typhoon-item .names {
  font-size: 14px;
  font-weight: 500;
}
.typhoon-item .meta {
  font-size: 12px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
}
.typhoon-item .active-badge {
  background: var(--accent-red);
  color: #fff;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.typhoon-item .category-badge {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
}
.category-td { background: #2d4a3e; color: #88bb99; }
.category-ts { background: #2d5a4a; color: #99ccaa; }
.category-sts { background: #3d5a3a; color: #aacc88; }
.category-ty { background: #5a3a2a; color: #cc8866; }
.category-sty { background: #5a2a1a; color: #ee7755; }
.category-super { background: #5a1a1a; color: #ff5544; }

/* Map */
.map-container {
  position: relative;
}
#map {
  width: 100%;
  height: 100%;
}
.map-overlay {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 800;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.map-control-btn {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  width: 36px; height: 36px;
  border-radius: var(--radius);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.2s;
}
.map-control-btn:hover { background: var(--accent-blue); }

.legend {
  position: absolute;
  bottom: 12px;
  left: 12px;
  z-index: 800;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 12px;
  font-size: 12px;
}
.legend-title {
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--text-secondary);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.legend-color {
  width: 24px;
  height: 4px;
  border-radius: 2px;
}

/* Right Panel - Details */
.right-panel {
  background: var(--bg-secondary);
  border-left: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.detail-title {
  padding: 16px;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-color);
}
.detail-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.detail-section {
  margin-bottom: 20px;
}
.detail-section h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--accent-cyan);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.info-item {
  background: var(--bg-card);
  border-radius: 6px;
  padding: 8px;
}
.info-item .label {
  font-size: 11px;
  color: var(--text-muted);
  margin-bottom: 2px;
}
.info-item .value {
  font-size: 14px;
  font-weight: 500;
}

/* Prediction Panel */
.prediction-controls {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.pred-btn {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  color: var(--text-primary);
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
}
.pred-btn:hover { background: var(--bg-hover); }
.pred-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); }

.pred-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.pred-table th {
  text-align: left;
  padding: 6px 4px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border-color);
  font-weight: 500;
}
.pred-table td {
  padding: 6px 4px;
  border-bottom: 1px solid var(--border-color);
}
.pred-confidence {
  display: inline-block;
  width: 40px;
  height: 4px;
  background: var(--bg-card);
  border-radius: 2px;
  position: relative;
}
.pred-confidence-bar {
  height: 100%;
  border-radius: 2px;
  background: var(--accent-green);
}

/* Track timeline */
.track-timeline {
  margin-bottom: 20px;
}
.timeline-point {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 6px 0;
  font-size: 12px;
}
.timeline-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-top: 2px;
}
.timeline-info {
  flex: 1;
}
.timeline-time {
  color: var(--text-secondary);
}
.timeline-pos {
  color: var(--text-primary);
  font-weight: 500;
}

/* Forecast tabs */
.forecast-tabs {
  display: flex;
  gap: 6px;
  margin-bottom: 8px;
}
.forecast-tab {
  padding: 4px 10px;
  background: var(--bg-card);
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  color: var(--text-secondary);
}
.forecast-tab:hover { background: var(--bg-hover); color: var(--text-primary); }
.forecast-tab.active { background: var(--accent-purple); color: #fff; }

/* Loading */
.loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(10,14,26,0.8);
  z-index: 2000;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border-color);
  border-top-color: var(--accent-blue);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 登陆点脉冲动画 */
@keyframes landfallPulse {
  0% { transform: translate(-50%,-50%) scale(1); opacity: 0.8; }
  100% { transform: translate(-50%,-50%) scale(3); opacity: 0; }
}
.landfall-pulse { background: transparent !important; border: none !important; }
.landfall-label { background: transparent !important; border: none !important; }
.loading-text { color: var(--text-secondary); font-size: 14px; }

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  color: var(--text-muted);
  text-align: center;
}
.empty-state i {
  font-size: 48px;
  margin-bottom: 16px;
  color: var(--border-color);
}
.empty-state p { font-size: 14px; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Toast */
.toast {
  position: fixed;
  top: 80px;
  right: 20px;
  background: var(--bg-card);
  border: 1px solid var(--accent-blue);
  border-radius: var(--radius);
  padding: 12px 20px;
  font-size: 13px;
  z-index: 3000;
  opacity: 0;
  transform: translateY(-20px);
  transition: all 0.3s;
}
.toast.show { opacity: 1; transform: translateY(0); }
.toast.error { border-color: var(--accent-red); }
</style>
</head>
<body>

<div class="app-layout">
  <!-- Header -->
  <header class="header">
    <div class="header-logo">
      <div class="icon"><i class="fas fa-wind"></i></div>
      <h1>台风路径预测系统</h1>
      <span class="sub">Typhoon Path Prediction System</span>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="btnCurrent" onclick="loadCurrentTyphoons()">
        <i class="fas fa-satellite-dish"></i> 活跃台风
      </button>
      <button class="header-btn" id="btnPredict" onclick="runPrediction()">
        <i class="fas fa-brain"></i> AI 预测
      </button>
      <button class="header-btn" id="btnRefresh" onclick="refreshAllData()">
        <i class="fas fa-sync-alt" id="refreshIcon"></i> 刷新数据
      </button>
      <span class="last-update" id="lastUpdateTime">--</span>
      <button class="header-btn" id="btnAutoRefresh" onclick="toggleAutoRefresh()" style="font-size:12px;padding:5px 10px">
        <i class="fas fa-clock"></i> <span id="autoRefreshLabel">自动: 5分钟</span>
      </button>
    </div>
  </header>

  <!-- Left Panel -->
  <div class="left-panel">
    <div class="panel-title">
      <span><i class="fas fa-list"></i> 台风列表</span>
      <span id="typhoonCount">0</span>
    </div>
    <div class="search-box">
      <input type="text" class="search-input" placeholder="搜索台风名称/编号..." id="searchInput" onkeyup="searchTyphoons()">
    </div>
    <div class="year-selector">
      <label>年份:</label>
      <select class="year-select" id="yearSelect"></select>
      <label>数据源:</label>
      <select class="year-select" id="sourceSelect" onchange="loadYearTyphoons()">
        <option value="isc">ISC (中国)</option>
        <option value="nii">NII (日本)</option>
      </select>
    </div>
    <div class="data-cache-panel" id="dataCachePanel">
      <button class="pred-btn" style="font-size:12px;padding:4px 10px" onclick="cacheAllData()">
        <i class="fas fa-download"></i> 缓存历史数据
      </button>
      <span id="dataStatus" style="font-size:12px;color:var(--text-secondary);margin-left:6px"></span>
    </div>
    <div class="typhoon-list" id="typhoonList">
      <div class="empty-state">
        <i class="fas fa-cloud-sun-rain"></i>
        <p>选择年份或查看活跃台风<br>开始探索台风数据</p>
      </div>
    </div>
  </div>

  <!-- Map -->
  <div class="map-container">
    <div id="map"></div>
    <div class="map-overlay">
      <button class="map-control-btn" onclick="togglePredictionLayers()" title="切换预测图层"><i class="fas fa-eye"></i></button>
      <button class="map-control-btn" onclick="toggleWindRadius()" title="切换风圈"><i class="fas fa-circle-notch"></i></button>
      <button class="map-control-btn" onclick="centerOnTyphoon()" title="定位台风"><i class="fas fa-crosshairs"></i></button>
      <button class="map-control-btn" onclick="resetMapView()" title="重置视图"><i class="fas fa-expand"></i></button>
    </div>
    <div class="legend">
      <div class="legend-title">台风等级</div>
      <div class="legend-item"><div class="legend-color" style="background:#88bb99"></div>热带低压(TD)</div>
      <div class="legend-item"><div class="legend-color" style="background:#55dd66"></div>热带风暴(TS)</div>
      <div class="legend-item"><div class="legend-color" style="background:#ddcc44"></div>强热带风暴(STS)</div>
      <div class="legend-item"><div class="legend-color" style="background:#ff8844"></div>台风(TY)</div>
      <div class="legend-item"><div class="legend-color" style="background:#ff5533"></div>强台风(STY)</div>
      <div class="legend-item"><div class="legend-color" style="background:#ff2222"></div>超强台风(Super TY)</div>
      <hr style="border-color:var(--border-color);margin:8px 0">
      <div class="legend-item"><div class="legend-color" style="background:#3b82f6"></div>趋势外推</div>
      <div class="legend-item"><div class="legend-color" style="background:#a855f7"></div>物理模型</div>
      <div class="legend-item"><div class="legend-color" style="background:#06b6d4"></div>Kalman融合</div>
      <div class="legend-item"><div class="legend-color" style="background:#f59e0b"></div>GFS数值预报</div>
      <div class="legend-item"><div class="legend-color" style="background:#14b8a6"></div>ECMWF AIFS AI</div>
      <div class="legend-item"><div class="legend-color" style="background:#f97316"></div>CMA GRAPES</div>
      <div class="legend-item"><div class="legend-color" style="background:#ef4444"></div>GraphCast AI</div>
      <div class="legend-item"><div class="legend-color" style="background:#84cc16"></div>历史类比</div>
      <div class="legend-item"><div class="legend-color" style="background:#ec4899"></div>LSTM深度学习</div>
      <div class="legend-item"><div class="legend-color" style="background:#8b5cf6"></div>盘古大模型(Pangu)</div>
      <div class="legend-item"><div class="legend-color" style="background:#f59e0b"></div>机构预报</div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="detail-title"><i class="fas fa-info-circle"></i> 台风详情</div>
    <div class="detail-content" id="detailContent">
      <div class="empty-state">
        <i class="fas fa-mouse-pointer"></i>
        <p>点击左侧台风列表<br>查看详细信息与预测</p>
      </div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay" style="display:none">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">加载中...</div>
</div>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ============================================================
// 全局状态
// ============================================================
const API_BASE = '';  // 自动跟随当前域名端口，兼容本地开发与服务器部署
let map;
let currentTyphoons = [];
let selectedTyphoon = null;
let trackLayers = [];
let predictionLayers = [];
let windRadiusLayers = [];
let showPrediction = true;
let showWindRadius = false;
let activePredictionMethod = 'ensemble';
let activeForecastAgency = null;

const CATEGORY_COLORS = {
  '热带低压(TD)': '#88bb99',
  '热带风暴(TS)': '#55dd66',
  '强热带风暴(STS)': '#ddcc44',
  '台风(TY)': '#ff8844',
  '强台风(STY)': '#ff5533',
  '超强台风(Super TY)': '#ff2222',
  '超强台风(SuperTY)': '#ff2222',
};

const PRED_COLORS = {
  trend: '#3b82f6',
  physics: '#a855f7',
  gfs: '#f59e0b',
  ecmwf: '#06b6d4',
  aifs: '#14b8a6',
  cma: '#f97316',
  gfs_graphcast: '#ef4444',
  analog: '#84cc16',
  lstm: '#ec4899',
  pangu: '#8b5cf6',
  ensemble: '#06b6d4',
};

// ============================================================
// 初始化
// ============================================================
function initApp() {
  initMap();
  initYearSelector();
  // 首次进入：默认加载本年度数据 + 自动缓存 + 检查活跃台风
  loadDefaultYearData();
  checkLSTMStatus();
  // 自动刷新：每5分钟检查活跃台风
  startAutoRefresh();
}

function initMap() {
  map = L.map('map', {
    center: [20, 130],
    zoom: 4,
    minZoom: 2,
    maxZoom: 12,
    zoomControl: false,
  });

  // 深色地图底图
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // 添加海岸线标注
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd',
    maxZoom: 19,
    pane: 'overlayPane'
  }).addTo(map);
}

function initYearSelector() {
  const select = document.getElementById('yearSelect');
  const currentYear = new Date().getFullYear();
  for (let y = currentYear; y >= 1945; y--) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y + '年';
    if (y === currentYear) opt.selected = true;
    select.appendChild(opt);
  }
  // 年份切换时自动加载数据
  select.addEventListener('change', () => loadYearTyphoons());
  // 初始化时检查数据状态
  checkDataStatus();
}

async function checkDataStatus() {
  try {
    const resp = await fetch(API_BASE + '/api/data/status');
    const status = await resp.json();
    const el = document.getElementById('dataStatus');
    if (el) {
      const total = status.total_cached_files || 0;
      const currentYear = status.current_year || 2026;

// ============================================================
// 自动刷新：每5分钟刷新活跃台风 + 已选中台风详情
// ============================================================
let refreshInterval = null;
let autoRefreshEnabled = true;
let lastRefreshTime = null;
const AUTO_REFRESH_MS = 5 * 60 * 1000; // 5分钟

function updateLastRefreshDisplay() {
  lastRefreshTime = new Date();
  const el = document.getElementById('lastUpdateTime');
  if (el) {
    el.textContent = '更新: ' + lastRefreshTime.toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
  }
}

function startAutoRefresh() {
  if (refreshInterval) clearInterval(refreshInterval);
  if (!autoRefreshEnabled) return;
  refreshInterval = setInterval(async () => {
    await doAutoRefresh();
  }, AUTO_REFRESH_MS);
  // 更新按钮状态
  updateAutoRefreshButton();
}

async function doAutoRefresh() {
  const icon = document.getElementById('refreshIcon');
  try {
    if (icon) icon.classList.add('spinning');
    // 1. 刷新台风列表
    const data = await apiCall('/api/typhoons/current');
    if (data && data.typhoons && data.count > 0) {
      currentTyphoons = data.typhoons;
      renderTyphoonList(data.typhoons);
      // 2. 如果有选中台风，刷新其详情+预测
      if (selectedTyphoon) {
        const detailData = await apiCall(`/api/typhoons/detail/${selectedTyphoon}`);
        if (detailData) {
          renderTyphoonDetail(detailData);
          renderTrackOnMap(detailData);
        }
      } else {
        // 没有选中台风时，地图移到最新位置
        const lastPoint = data.typhoons[0]?.points?.[data.typhoons[0].points.length - 1];
        if (lastPoint && map) {
          map.setView([lastPoint.lat, lastPoint.lng], 5, { animate: true });
        }
      }
      showToast(`自动刷新: ${data.count} 个活跃台风`);
    }
    updateLastRefreshDisplay();
  } catch(e) {
    console.error('Auto refresh error:', e);
  } finally {
    if (icon) icon.classList.remove('spinning');
  }
}

function toggleAutoRefresh() {
  autoRefreshEnabled = !autoRefreshEnabled;
  if (autoRefreshEnabled) {
    startAutoRefresh();
    showToast('自动刷新已开启 (5分钟)');
  } else {
    if (refreshInterval) clearInterval(refreshInterval);
    refreshInterval = null;
    showToast('自动刷新已关闭');
  }
  updateAutoRefreshButton();
}

function updateAutoRefreshButton() {
  const btn = document.getElementById('btnAutoRefresh');
  const label = document.getElementById('autoRefreshLabel');
  if (btn && label) {
    if (autoRefreshEnabled) {
      label.textContent = '自动: 5分钟';
      btn.classList.add('active');
    } else {
      label.textContent = '自动: 关闭';
      btn.classList.remove('active');
    }
  }
}

// ============================================================
// 数据加载
// ============================================================
function showLoading(text) {
  document.getElementById('loadingText').textContent = text || '加载中...';
  document.getElementById('loadingOverlay').style.display = 'flex';
}
function hideLoading() {
  document.getElementById('loadingOverlay').style.display = 'none';
}
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

async function apiCall(url, timeoutMs = 30000) {
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), timeoutMs);
    const resp = await fetch(API_BASE + url, { signal: controller.signal });
    clearTimeout(timer);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return await resp.json();
  } catch (e) {
    console.error('API Error:', e);
    if (e.name === 'AbortError') {
      showToast('请求超时，请尝试切换更快的预测方法', true);
    } else {
      showToast('数据加载失败: ' + e.message, true);
    }
    return null;
  }
}

// 预测专用API调用：超时更长(5分钟)，自动降级
async function predictApiCall(tfbh, hours, method) {
  // 第一次尝试：用用户指定的方法（超时5分钟）
  const data = await apiCall(`/api/typhoons/predict/${tfbh}?hours=${hours}&method=${method}`, 300000);
  if (data && data.predictions) return data;

  // 如果ensemble/all失败，自动降级到trend（秒级响应）
  if (method === 'ensemble' || method === 'all') {
    showToast('综合方法超时，自动降级为趋势外推...', true);
    const fallback = await apiCall(`/api/typhoons/predict/${tfbh}?hours=${hours}&method=trend`, 30000);
    if (fallback && fallback.predictions) return fallback;
  }

  return null;
}

// 列表渲染
// ============================================================
function renderTyphoonList(typhoons) {
  const container = document.getElementById('typhoonList');
  document.getElementById('typhoonCount').textContent = typhoons.length;

  if (!typhoons.length) {
    container.innerHTML = '<div class="empty-state"><i class="fas fa-cloud"></i><p>暂无台风数据</p></div>';
    return;
  }

  container.innerHTML = typhoons.map(t => {
    const maxCat = getMaxCategory(t);
    const catClass = getCategoryClass(maxCat);
    const catColor = CATEGORY_COLORS[maxCat] || '#888';
    const lastPoint = t.points && t.points.length > 0 ? t.points[t.points.length - 1] : null;
    const isActive = t.is_current === 1;

    return `<div class="typhoon-item" data-id="${t.id}" onclick="selectTyphoon('${t.id}')">
      <div class="id-row">
        <span class="tfid">${t.id}</span>
        ${isActive ? '<span class="active-badge">活跃</span>' : ''}
        <span class="category-badge ${catClass}" style="background:${catColor}22;color:${catColor}">${maxCat || '未知'}</span>
      </div>
      <div class="names">${t.name_cn || ''} ${t.name_en ? '(' + t.name_en + ')' : ''}</div>
      <div class="meta">
        <span>${t.begin_time ? t.begin_time.slice(0,10) : ''} ~ ${t.end_time ? t.end_time.slice(0,10) : ''}</span>
        <span>${t.points ? t.points.length + '个数据点' : ''}</span>
      </div>
    </div>`;
  }).join('');
}

function getMaxCategory(typhoon) {
  if (!typhoon.points || !typhoon.points.length) return '';
  // 找最强等级
  let maxPower = 0;
  let maxCat = '';
  for (const p of typhoon.points) {
    if (p.power > maxPower) {
      maxPower = p.power;
      maxCat = p.category;
    }
  }
  return maxCat;
}

function getCategoryClass(cat) {
  if (!cat) return '';
  if (cat.includes('TD')) return 'category-td';
  if (cat.includes('Super')) return 'category-super';
  if (cat.includes('STY')) return 'category-sty';
  if (cat.includes('TY')) return 'category-ty';
  if (cat.includes('STS')) return 'category-sts';
  if (cat.includes('TS')) return 'category-ts';
  return '';
}

// 地图渲染
// ============================================================
function clearMapLayers() {
  trackLayers.forEach(l => map.removeLayer(l));
  predictionLayers.forEach(l => map.removeLayer(l));
  windRadiusLayers.forEach(l => map.removeLayer(l));
  trackLayers = [];
  predictionLayers = [];
  windRadiusLayers = [];
}

function renderTrackOnMap(t) {
  clearMapLayers();

  if (!t.points || !t.points.length) return;

  // 绘制路径线段（按等级分段变色）
  let prevPoint = null;
  for (const p of t.points) {
    const color = CATEGORY_COLORS[p.category] || '#888';
    if (prevPoint) {
      const line = L.polyline(
        [[prevPoint.lat, prevPoint.lng], [p.lat, p.lng]],
        { color: color, weight: 3, opacity: 0.8 }
      ).addTo(map);
      trackLayers.push(line);
    }

    // 绘制数据点
    const marker = L.circleMarker([p.lat, p.lng], {
      radius: p.power ? Math.max(3, Math.min(8, p.power - 4)) : 4,
      fillColor: color,
      fillOpacity: 0.9,
      color: '#fff',
      weight: 1,
      opacity: 0.5,
    }).addTo(map);
    marker.bindTooltip(`
      <div style="font-size:12px;line-height:1.4">
        <strong>${t.name_cn || t.name_en || t.id}</strong><br>
        ${p.time ? p.time.slice(0,16) : ''}<br>
        ${p.lat}°N, ${p.lng}°E<br>
        气压: ${p.pressure || '-'} hPa<br>
        风速: ${p.wind_speed || '-'} m/s<br>
        ${p.category || '-'}
      </div>
    `, { className: 'typhoon-tooltip' });
    trackLayers.push(marker);
    prevPoint = p;
  }

  // 绘制风圈
  if (showWindRadius) {
    renderWindRadius(t);
  }

  // 显示预测路径（如果有）
  if (showPrediction && selectedTyphoon) {
    loadAndRenderPrediction(selectedTyphoon, 120, activePredictionMethod);
  }

  // 显示机构预报（如果有）
  if (t.forecasts && Object.keys(t.forecasts).length > 0) {
    for (const agency of Object.keys(t.forecasts)) {
      renderForecastOnMap(t, agency);
    }
  }

  // 调整视图范围
  const bounds = L.latLngBounds(t.points.map(p => [p.lat, p.lng]));
  map.fitBounds(bounds, { padding: [50, 50] });
}

function renderWindRadius(t) {
  if (!t.points) return;
  const lastPoint = t.points[t.points.length - 1];
  if (!lastPoint) return;

  // 七级风圈
  if (lastPoint.radius7 && lastPoint.radius7 > 0) {
    const circle = L.circle([lastPoint.lat, lastPoint.lng], {
      radius: lastPoint.radius7 * 1000, // km -> m
      color: '#55dd66',
      fillColor: '#55dd66',
      fillOpacity: 0.15,
      weight: 1,
    }).addTo(map);
    windRadiusLayers.push(circle);

    // 四象限风圈
    if (lastPoint.radius7_quad) {
      const quads = lastPoint.radius7_quad;
      drawWindQuadrant(lastPoint, quads, '#55dd66', 0.2);
    }
  }

  // 十级风圈
  if (lastPoint.radius10 && lastPoint.radius10 > 0) {
    const circle = L.circle([lastPoint.lat, lastPoint.lng], {
      radius: lastPoint.radius10 * 1000,
      color: '#ff8844',
      fillColor: '#ff8844',
      fillOpacity: 0.12,
      weight: 1,
    }).addTo(map);
    windRadiusLayers.push(circle);
  }
}

function drawWindQuadrant(point, quads, color, opacity) {
  const ne = quads.ne || 0;
  const se = quads.se || 0;
  const sw = quads.sw || 0;
  const nw = quads.nw || 0;
  if (!ne && !se && !sw && !nw) return;

  // 绘制每个象限的风圈弧
  const center = [point.lat, point.lng];
  const angles = {
    ne: [0, 90],
    se: [90, 180],
    sw: [180, 270],
    nw: [270, 360]
  };

  for (const [dir, r] of Object.entries(quads)) {
    if (r <= 0) continue;
    const [startAngle, endAngle] = angles[dir];
    const points = [];
    for (let a = startAngle; a <= endAngle; a += 5) {
      const rad = a * Math.PI / 180;
      const dlat = r * Math.cos(rad) / 111.32;
      const dlng = r * Math.sin(rad) / (111.32 * Math.cos(point.lat * Math.PI / 180));
      points.push([point.lat + dlat, point.lng + dlng]);
    }
    points.push(center);
    const polygon = L.polygon(points, {
      color: color,
      fillColor: color,
      fillOpacity: opacity,
      weight: 1,
    }).addTo(map);
    windRadiusLayers.push(polygon);
  }
}

function renderForecastOnMap(t, agency) {
  if (!t.forecasts || !t.forecasts[agency]) return;
  const fc = t.forecasts[agency];

  // 找预报的基准点
  let basePoint = null;
  if (t.points && t.points.length) {
    for (const p of t.points) {
      if (p.time && fc.forecast_time && p.time.slice(0,16) === fc.forecast_time.slice(0,16)) {
        basePoint = p;
        break;
      }
    }
    if (!basePoint) basePoint = t.points[t.points.length - 1];
  }

  const fcPoints = fc.points;
  if (!fcPoints || !fcPoints.length) return;

  // 从基准点到预报点的连线
  const allCoords = [];
  if (basePoint) allCoords.push([basePoint.lat, basePoint.lng]);
  for (const p of fcPoints) {
    allCoords.push([p.lat, p.lng]);
  }

  const line = L.polyline(allCoords, {
    color: '#f59e0b',
    weight: 2,
    opacity: 0.7,
    dashArray: '8, 4',
  }).addTo(map);
  trackLayers.push(line);

  // 预报点标记
  for (const p of fcPoints) {
    const marker = L.circleMarker([p.lat, p.lng], {
      radius: 4,
      fillColor: '#f59e0b',
      fillOpacity: 0.8,
      color: '#fff',
      weight: 1,
    }).addTo(map);
    marker.bindTooltip(`
      <div style="font-size:12px">
        <strong>[${agency}预报]</strong><br>
        ${p.time ? p.time.slice(0,16) : ''}<br>
        ${p.lat}°N, ${p.lng}°E<br>
        ${p.pressure || '-'} hPa
      </div>
    `);
    trackLayers.push(marker);
  }
}

// ============================================================
// 预测功能
// ============================================================
function setPredMethod(method) {
  activePredictionMethod = method;
  document.querySelectorAll('.pred-btn').forEach(el => {
    const map = {'趋势':'trend','物理':'physics','GFS':'gfs','AIFS':'aifs','CMA':'cma','GraphCast':'gfs_graphcast','历史':'analog','LSTM':'lstm','盘古':'pangu','综合':'ensemble','全部':'all'};
    const key = Object.keys(map).find(k => el.textContent.includes(k));
    el.classList.toggle('active', key && map[key] === method);
  });
  if (selectedTyphoon) {
    loadAndRenderPrediction(selectedTyphoon, 72, method);
  }
}

async function runPrediction() {
  if (!selectedTyphoon) {
    showToast('请先选择一个台风', true);
    return;
  }
  await runPredictionFor(168);
}

async function runPredictionFor(hours) {
  if (!selectedTyphoon) {
    showToast('请先选择一个台风', true);
    return;
  }

  // 更新时长按钮 active 状态
  document.querySelectorAll('.prediction-controls .pred-btn').forEach(btn => {
    const btnHours = parseInt(btn.textContent) ||
                     (btn.textContent === '5天' ? 120 :
                      btn.textContent === '7天' ? 168 :
                      btn.textContent === '10天' ? 240 : 0);
    btn.classList.toggle('active', btnHours === hours);
  });

  // 检查LSTM方法是否可用
  if (activePredictionMethod === 'lstm' || activePredictionMethod === 'all') {
    try {
      const statusResp = await fetch(`${API_BASE}/api/lstm/status`);
      const status = await statusResp.json();
      if (!status.ready) {
        showToast('LSTM模型尚未训练，请先训练模型或切换其他方法', true);
        const panel = document.getElementById('lstmTrainPanel');
        if (panel) panel.style.display = 'block';
        return;
      }
    } catch(e) {}
  }

  showLoading(`AI 预测计算中 (${hours}h, ${activePredictionMethod})...`);
  await loadAndRenderPrediction(selectedTyphoon, hours, activePredictionMethod);
  hideLoading();
  showToast(`预测完成: ${hours}小时 ${activePredictionMethod} 方法`);
}

async function checkLSTMStatus() {
  try {
    const resp = await fetch(`${API_BASE}/api/lstm/status`);
    const status = await resp.json();
    const el = document.getElementById('lstmStatus');
    const panel = document.getElementById('lstmTrainPanel');
    if (el) {
      if (status.ready) {
        el.textContent = '✅ LSTM模型已就绪';
        el.style.color = '#22c55e';
      } else {
        el.textContent = '⚠️ LSTM模型未训练';
        el.style.color = '#f59e0b';
      }
    }
    if (panel) panel.style.display = 'block';
  } catch(e) {
    console.log('LSTM status check failed', e);
  }
}

async function trainLSTM() {
  showLoading('正在训练LSTM模型，可能需要1-3分钟...');
  try {
    const resp = await fetch(`${API_BASE}/api/lstm/train`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({years: [2015,2016,2017,2018,2019,2020,2021,2022,2023,2024], epochs: 80})
    });
    const result = await resp.json();
    hideLoading();
    if (result.success) {
      showToast(`LSTM训练成功！${result.message}`);
      checkLSTMStatus();
    } else {
      showToast('训练失败: ' + (result.error || '未知错误'), true);
      if (result.suggestion) {
        showToast(result.suggestion, true);
      }
    }
  } catch(e) {
    hideLoading();
    showToast('训练请求失败: ' + e.message, true);
  }
}

async function loadAndRenderPrediction(tfbh, hours, method) {
  const data = await predictApiCall(tfbh, hours, method);
  if (!data || !data.predictions) return;

  // 清除之前的预测图层
  predictionLayers.forEach(l => map.removeLayer(l));
  predictionLayers = [];

  const predContainer = document.getElementById('predictionResults');
  if (!predContainer) return;

  let html = '';

  // 渲染每种预测方法的结果
  for (const [methodKey, points] of Object.entries(data.predictions)) {
    if (methodKey.startsWith('forecast_')) continue; // 机构预报单独处理
    if (!points || !points.length) continue;

    const color = PRED_COLORS[methodKey] || '#888';
    const label = methodKey === 'trend' ? '趋势外推' : methodKey === 'physics' ? '物理模型' : methodKey === 'ensemble' ? 'Kalman融合' : methodKey === 'gfs' ? 'GFS数值预报' : methodKey === 'ecmwf' ? 'ECMWF IFS' : methodKey === 'aifs' ? 'ECMWF AIFS' : methodKey === 'cma' ? 'CMA GRAPES' : methodKey === 'gfs_graphcast' ? 'GraphCast AI' : methodKey === 'analog' ? '历史类比' : methodKey === 'lstm' ? 'LSTM深度学习' : methodKey === 'pangu' ? '盘古大模型' : methodKey;

    // 绘制预测路径
    const coords = [[data.base_lat, data.base_lng]];
    for (const p of points) {
      coords.push([p.lat, p.lng]);
    }

    const line = L.polyline(coords, {
      color: color,
      weight: methodKey === 'ensemble' ? 4 : 2,
      opacity: methodKey === 'ensemble' ? 0.9 : 0.6,
      dashArray: methodKey === 'ensemble' ? '' : '6, 4',
    }).addTo(map);
    predictionLayers.push(line);

    // 预测点标记
    for (const p of points) {
      const marker = L.circleMarker([p.lat, p.lng], {
        radius: methodKey === 'ensemble' ? 5 : 3,
        fillColor: color,
        fillOpacity: 0.8,
        color: '#fff',
        weight: 1,
      }).addTo(map);
      marker.bindTooltip(`
        <div style="font-size:12px">
          <strong>[${label}预测]</strong><br>
          ${p.time ? p.time.slice(0,16) : ''}<br>
          ${p.lat}°N, ${p.lng}°E<br>
          气压: ${p.pressure || '-'} hPa<br>
          风速: ${p.wind_speed || '-'} m/s<br>
          置信度: ${(p.confidence * 100).toFixed(0)}%
        </div>
      `);
      predictionLayers.push(marker);
    }

    // 不确定性区域（综合预测时显示）
    if (methodKey === 'ensemble' && points.length > 1) {
      const tPoints = data.predictions['trend'];
      const pPoints = data.predictions['physics'];
      if (tPoints && pPoints && tPoints.length === pPoints.length) {
        // 绘制趋势和物理之间的区域表示不确定性
        const upperCoords = [[data.base_lat, data.base_lng]];
        const lowerCoords = [[data.base_lat, data.base_lng]];
        for (let i = 0; i < Math.min(tPoints.length, pPoints.length); i++) {
          upperCoords.push([tPoints[i].lat, tPoints[i].lng]);
          lowerCoords.push([pPoints[i].lat, pPoints[i].lng]);
        }
        const areaCoords = [...upperCoords, ...lowerCoords.reverse()];
        const area = L.polygon(areaCoords, {
          color: color,
          fillColor: color,
          fillOpacity: 0.08,
          weight: 0,
        }).addTo(map);
        predictionLayers.push(area);
      }
    }

    // 详情表格
    html += `
      <div style="margin-bottom:12px">
        <div style="font-size:12px;color:${color};font-weight:600;margin-bottom:4px">
          <i class="fas fa-chart-line"></i> ${label}预测 (${points.length}个点)
        </div>
        <table class="pred-table">
          <tr><th>时间</th><th>位置</th><th>气压</th><th>风速</th><th>等级</th><th>置信度</th></tr>
          ${points.slice(0, 6).map(p => `
            <tr>
              <td>${p.time ? p.time.slice(11,16) : '-'}</td>
              <td>${p.lat}°N, ${p.lng}°E</td>
              <td>${p.pressure || '-'} hPa</td>
              <td>${p.wind_speed || '-'} m/s</td>
              <td style="color:${CATEGORY_COLORS[p.category]||'#fff'}">${p.category || '-'}</td>
              <td>
                <div class="pred-confidence">
                  <div class="pred-confidence-bar" style="width:${(p.confidence*100).toFixed(0)}%;background:${p.confidence>0.6?'var(--accent-green)':p.confidence>0.4?'var(--accent-orange)':'var(--accent-red)'}"></div>
                </div>
                ${(p.confidence*100).toFixed(0)}%
              </td>
            </tr>
          `).join('')}
        </table>
      </div>`;
  }

  // ============================================================
  // 登陆点标记
  // ============================================================
  if (data.landfalls && Object.keys(data.landfalls).length > 0) {
    // 在预测面板顶部添加登陆摘要
    const lfEnsemble = data.landfalls['ensemble'];
    const lfFirst = lfEnsemble || Object.values(data.landfalls)[0];
    if (lfFirst) {
      const lfMethodLabel = lfEnsemble ? 'Kalman融合' : Object.keys(data.landfalls)[0];
      html = `
        <div style="background:linear-gradient(135deg,rgba(239,68,68,0.15),rgba(234,179,8,0.1));border:1px solid rgba(239,68,68,0.4);border-radius:8px;padding:12px;margin-bottom:12px">
          <div style="font-size:14px;font-weight:700;color:#ef4444;margin-bottom:4px">
            <i class="fas fa-bullseye"></i> 预测登陆点 (${lfMethodLabel}方法)
          </div>
          <div style="font-size:12px;color:var(--text-primary);line-height:1.6">
            <strong>📍 ${lfFirst.coast_name}</strong> 沿海<br>
            位置: <strong>${lfFirst.lat}°N, ${lfFirst.lng}°E</strong><br>
            预计时间: <strong>${lfFirst.time ? lfFirst.time.slice(0,16) : '-'}</strong> (约${lfFirst.hours_from_base}小时后)<br>
            登陆强度: 气压 <strong>${lfFirst.pressure || '?'} hPa</strong> | 风速 <strong>${lfFirst.wind_speed || '?'} m/s</strong>
          </div>
          ${Object.keys(data.landfalls).length > 1 ? `
          <div style="font-size:11px;color:var(--text-muted);margin-top:6px;border-top:1px solid rgba(239,68,68,0.2);padding-top:6px">
            其他方法: ${Object.entries(data.landfalls)
              .filter(([k]) => k !== 'ensemble')
              .map(([k, v]) => `${k}→${v.coast_name}(${v.hours_from_base}h)`)
              .join(' | ') || '全部一致'}
          </div>` : ''}
        </div>
      ` + html;
    }

    // 地图上绘制登陆点标记
    for (const [methodKey, lf] of Object.entries(data.landfalls)) {
      if (!lf.found) continue;
      const color = methodKey === 'ensemble' ? '#ef4444' : (PRED_COLORS[methodKey] || '#f59e0b');
      const isEns = methodKey === 'ensemble';

      // 1. 脉冲圆圈（在预测路径上标注登陆点）
      const pulseIcon = L.divIcon({
        className: 'landfall-pulse',
        html: `<div style="position:relative;width:30px;height:30px;">
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
            width:14px;height:14px;border-radius:50%;background:${color};
            border:3px solid #fff;box-shadow:0 0 8px ${color},0 0 16px ${color};z-index:2;"></div>
          <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
            width:14px;height:14px;border-radius:50%;border:2px solid ${color};
            animation:landfallPulse 1.5s ease-out infinite;z-index:1;"></div>
        </div>`,
        iconSize: [30, 30],
        iconAnchor: [15, 15],
        popupAnchor: [0, -18],
      });
      const pulseMarker = L.marker([lf.lat, lf.lng], { icon: pulseIcon, zIndexOffset: 1000 }).addTo(map);
      pulseMarker.bindPopup(`
        <div style="font-size:13px;min-width:200px;">
          <div style="font-size:14px;font-weight:bold;color:${color};margin-bottom:4px;">
            🚩 预测登陆点 ${isEns ? '(Kalman融合)' : '(' + methodKey + ')'}
          </div>
          <div style="color:#666;margin-bottom:2px;">📍 ${lf.coast_name} 沿海</div>
          <div>${lf.lat}°N, ${lf.lng}°E</div>
          <div>⏰ ${lf.time ? lf.time.slice(0,16) : '-'} (${lf.hours_from_base}h后)</div>
          <div>🌡 ${lf.pressure || '-'} hPa | ${lf.wind_speed || '-'} m/s</div>
        </div>
      `);
      predictionLayers.push(pulseMarker);

      // 2. 登陆标签（显示在登陆点旁边）
      const labelIcon = L.divIcon({
        className: 'landfall-label',
        html: `<div style="
          background:${color};color:#fff;
          padding:2px 8px;border-radius:4px;
          font-size:11px;font-weight:bold;
          white-space:nowrap;
          box-shadow:0 2px 6px rgba(0,0,0,0.4);
          border:1px solid rgba(255,255,255,0.3);
        ">🚩 ${lf.coast_name} ${lf.hours_from_base}h</div>`,
        iconSize: [120, 20],
        iconAnchor: [0, -12],
      });
      const labelMarker = L.marker([lf.lat, lf.lng], { icon: labelIcon, interactive: false }).addTo(map);
      predictionLayers.push(labelMarker);

      // 3. 从当前台风位置画虚线到登陆点（仅ensemble）
      if (isEns) {
        const approachLine = L.polyline(
          [[data.base_lat, data.base_lng], [lf.lat, lf.lng]],
          { color: color, weight: 2, opacity: 0.4, dashArray: '8, 6' }
        ).addTo(map);
        predictionLayers.push(approachLine);
      }
    }
  }

  // 基准信息
  html += `
    <div style="font-size:11px;color:var(--text-muted);margin-top:8px">
      预测基准: ${data.base_time ? data.base_time.slice(0,16) : '-'} |
      位置: ${data.base_lat}°N, ${data.base_lng}°E |
      综合置信度: ${(data.confidence * 100).toFixed(0)}%
    </div>`;

  predContainer.innerHTML = html;
}

// ============================================================
// 地图控制
// ============================================================
function togglePredictionLayers() {
  showPrediction = !showPrediction;
  predictionLayers.forEach(l => {
    if (showPrediction) l.addTo(map);
    else map.removeLayer(l);
  });
  showToast(showPrediction ? '显示预测图层' : '隐藏预测图层');
}

function toggleWindRadius() {
  showWindRadius = !showWindRadius;
  windRadiusLayers.forEach(l => {
    if (showWindRadius) l.addTo(map);
    else map.removeLayer(l);
  });
  if (showWindRadius && selectedTyphoon) {
    const t = currentTyphoons.find(t => t.id === selectedTyphoon);
    if (t) renderWindRadius(t);
  }
  showToast(showWindRadius ? '显示风圈范围' : '隐藏风圈范围');
}

function centerOnTyphoon() {
  if (!selectedTyphoon) return;
  const t = currentTyphoons.find(t => t.id === selectedTyphoon);
  if (t && t.points && t.points.length) {
    const last = t.points[t.points.length - 1];
    map.setView([last.lat, last.lng], 6);
  }
}

function resetMapView() {
  map.setView([20, 130], 4);
}
